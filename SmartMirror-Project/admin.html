<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silver Mirror | Admin Panel</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --bg-dark: #000000;
            --glass-bg: rgba(0, 0, 0, 0.6);
            --glass-border: rgba(255, 255, 255, 0.05);
            --accent-silver: #e0e0e0;
            --accent-blue: #4facfe;
            --accent-pink: #ff007f;
            --accent-glow: rgba(255, 0, 127, 0.5);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --shadow-soft: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        html, body, #root {
            width: 100%;
            height: 100%;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
        }

        .admin-container {
            width: 100%;
            height: 100vh;
            display: flex;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a1a 50%, #0a0a1a 100%);
            overflow: hidden;
        }

        .admin-sidebar {
            width: 280px;
            background: rgba(10, 10, 20, 0.8);
            border-right: 1px solid var(--glass-border);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            overflow-y: auto;
        }

        .admin-logo {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--accent-pink), var(--accent-blue));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .admin-nav {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .nav-item {
            padding: 0.8rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .nav-item:hover {
            background: rgba(255, 0, 127, 0.1);
            border-color: var(--accent-pink);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(255, 0, 127, 0.2), rgba(79, 172, 254, 0.2));
            border-color: var(--accent-pink);
            color: var(--text-primary);
        }

        .admin-main {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .admin-header h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .logout-btn {
            padding: 0.6rem 1.5rem;
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .logout-btn:hover {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .content-panel {
            display: none;
        }

        .content-panel.active {
            display: block;
        }

        .card {
            background: linear-gradient(135deg, rgba(30, 30, 40, 0.8), rgba(20, 20, 30, 0.8));
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-soft);
        }

        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .form-group label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 0.8rem 1rem;
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.3s;
            font-family: 'Outfit', sans-serif;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-pink);
            background: rgba(255, 0, 127, 0.05);
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.1);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-secondary);
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 2rem;
        }

        .btn {
            padding: 0.9rem 2rem;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-blue));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-pink);
        }

        .status-message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .status-success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.5);
            color: #4cb050;
        }

        .status-error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.5);
            color: #f44336;
        }

        .status-info {
            background: rgba(79, 172, 254, 0.1);
            border: 1px solid rgba(79, 172, 254, 0.5);
            color: #4facfe;
        }

        .mirror-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .mirror-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s;
        }

        .mirror-card:hover {
            background: rgba(255, 0, 127, 0.05);
            border-color: var(--accent-pink);
            transform: translateY(-2px);
        }

        .mirror-card h3 {
            margin-bottom: 0.8rem;
            color: var(--accent-pink);
        }

        .mirror-info {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            word-break: break-all;
        }

        .mirror-actions {
            display: flex;
            gap: 0.8rem;
            margin-top: 1rem;
        }

        .mirror-actions button {
            flex: 1;
            padding: 0.6rem;
            font-size: 0.85rem;
            border: 1px solid var(--glass-border);
            background: transparent;
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .mirror-actions button:hover {
            background: rgba(255, 0, 127, 0.1);
            border-color: var(--accent-pink);
            color: var(--accent-pink);
        }

        .status-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.5);
            color: #4cb050;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 0.8rem;
        }

        @media (max-width: 768px) {
            .admin-sidebar {
                display: none;
            }

            .admin-container {
                flex-direction: column;
            }

            .mirror-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function AdminPanel() {
            const [activeTab, setActiveTab] = useState('mirrors');
            const [feedUrl, setFeedUrl] = useState('');
            const [feedType, setFeedType] = useState('camera');
            const [mirrorName, setMirrorName] = useState('');
            const [status, setStatus] = useState('');
            const [mirrors, setMirrors] = useState([]);

            // Load mirrors from localStorage on mount
            useEffect(() => {
                loadMirrors();
            }, []);

            const loadMirrors = () => {
                const saved = localStorage.getItem('adminMirrors');
                if (saved) {
                    setMirrors(JSON.parse(saved));
                }
                // Also load the old format for backward compatibility
                const oldUrl = localStorage.getItem('adminFeedUrl');
                if (oldUrl && mirrors.length === 0) {
                    const oldType = localStorage.getItem('adminFeedType') || 'camera';
                    setMirrors([{
                        id: Date.now(),
                        name: 'Default Mirror',
                        url: oldUrl,
                        type: oldType,
                        createdAt: new Date().toLocaleString()
                    }]);
                }
            };

            const saveMirror = () => {
                if (!mirrorName.trim()) {
                    showStatus('Please enter mirror name', 'error');
                    return;
                }

                if (feedType !== 'camera' && !feedUrl.trim()) {
                    showStatus('Please enter a valid URL', 'error');
                    return;
                }

                const newMirror = {
                    id: Date.now(),
                    name: mirrorName,
                    url: feedUrl || 'Local Camera',
                    type: feedType,
                    createdAt: new Date().toLocaleString()
                };

                const updatedMirrors = [...mirrors, newMirror];
                setMirrors(updatedMirrors);
                localStorage.setItem('adminMirrors', JSON.stringify(updatedMirrors));
                
                // Also save to old format for backward compatibility
                localStorage.setItem('adminFeedUrl', feedUrl);
                localStorage.setItem('adminFeedType', feedType);

                showStatus('✓ Mirror configuration saved!', 'success');
                resetForm();
            };

            const deleteMirror = (id) => {
                const updatedMirrors = mirrors.filter(m => m.id !== id);
                setMirrors(updatedMirrors);
                localStorage.setItem('adminMirrors', JSON.stringify(updatedMirrors));
                showStatus('Mirror deleted', 'info');
            };

            const resetForm = () => {
                setMirrorName('');
                setFeedUrl('');
                setFeedType('camera');
            };

            const showStatus = (message, type = 'info') => {
                setStatus({ message, type });
                setTimeout(() => setStatus(''), 3000);
            };

            return (
                <div className="admin-container">
                    {/* Sidebar */}
                    <div className="admin-sidebar">
                        <div className="admin-logo">🏢 Admin</div>
                        <nav className="admin-nav">
                            <div
                                className={`nav-item ${activeTab === 'mirrors' ? 'active' : ''}`}
                                onClick={() => setActiveTab('mirrors')}
                            >
                                <span>🪞</span> Mirrors
                            </div>
                            <div
                                className={`nav-item ${activeTab === 'settings' ? 'active' : ''}`}
                                onClick={() => setActiveTab('settings')}
                            >
                                <span>⚙️</span> Settings
                            </div>
                            <div
                                className={`nav-item ${activeTab === 'help' ? 'active' : ''}`}
                                onClick={() => setActiveTab('help')}
                            >
                                <span>❓</span> Help
                            </div>
                        </nav>
                    </div>

                    {/* Main Content */}
                    <div className="admin-main">
                        <div className="admin-header">
                            <h1>Silver Mirror Control</h1>
                            <button className="logout-btn">User Portal</button>
                        </div>

                        {/* Mirrors Tab */}
                        <div className={`content-panel ${activeTab === 'mirrors' ? 'active' : ''}`}>
                            <div className="card">
                                <h2>Add New Mirror</h2>
                                
                                {status && (
                                    <div className={`status-message status-${status.type}`}>
                                        {status.message}
                                    </div>
                                )}

                                <div className="form-group">
                                    <label>Mirror Name</label>
                                    <input
                                        type="text"
                                        placeholder="e.g., Living Room, Bedroom"
                                        value={mirrorName}
                                        onChange={(e) => setMirrorName(e.target.value)}
                                    />
                                </div>

                                <div className="form-group">
                                    <label>Feed Type</label>
                                    <select value={feedType} onChange={(e) => setFeedType(e.target.value)}>
                                        <option value="camera">Local Camera</option>
                                        <option value="url">Stream URL (MJPEG)</option>
                                        <option value="rtsp">RTSP Stream</option>
                                    </select>
                                </div>

                                {feedType !== 'camera' && (
                                    <div className="form-group">
                                        <label>Stream URL</label>
                                        <input
                                            type="text"
                                            placeholder="e.g., http://192.168.1.100:8080/stream"
                                            value={feedUrl}
                                            onChange={(e) => setFeedUrl(e.target.value)}
                                        />
                                        <small style={{ color: 'var(--text-secondary)', marginTop: '0.3rem' }}>
                                            Make sure the stream URL is accessible from the user's network
                                        </small>
                                    </div>
                                )}

                                <div className="btn-group">
                                    <button className="btn btn-primary" onClick={saveMirror}>
                                        Save Mirror
                                    </button>
                                    <button className="btn btn-secondary" onClick={resetForm}>
                                        Clear
                                    </button>
                                </div>
                            </div>

                            {/* Saved Mirrors */}
                            {mirrors.length > 0 && (
                                <div className="card">
                                    <h2>Configured Mirrors ({mirrors.length})</h2>
                                    <div className="mirror-list">
                                        {mirrors.map((mirror) => (
                                            <div key={mirror.id} className="mirror-card">
                                                <div className="status-badge">Active</div>
                                                <h3>🪞 {mirror.name}</h3>
                                                <div className="mirror-info">
                                                    <strong>Type:</strong> {mirror.type === 'camera' ? 'Local Camera' : mirror.type}
                                                </div>
                                                <div className="mirror-info">
                                                    <strong>Feed:</strong> {mirror.url}
                                                </div>
                                                <div className="mirror-info" style={{ fontSize: '0.8rem', opacity: 0.7 }}>
                                                    {mirror.createdAt}
                                                </div>
                                                <div className="mirror-actions">
                                                    <button onClick={() => {
                                                        setMirrorName(mirror.name);
                                                        setFeedType(mirror.type);
                                                        setFeedUrl(mirror.url === 'Local Camera' ? '' : mirror.url);
                                                    }}>
                                                        ✏️ Edit
                                                    </button>
                                                    <button onClick={() => deleteMirror(mirror.id)}>
                                                        🗑️ Delete
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Settings Tab */}
                        <div className={`content-panel ${activeTab === 'settings' ? 'active' : ''}`}>
                            <div className="card">
                                <h2>Admin Settings</h2>
                                
                                <div className="form-group">
                                    <label>Auto-refresh Interval (seconds)</label>
                                    <select>
                                        <option>1 second</option>
                                        <option>2 seconds</option>
                                        <option>5 seconds</option>
                                        <option>10 seconds</option>
                                    </select>
                                </div>

                                <div className="form-group">
                                    <label>Default Mirror Feed Type</label>
                                    <select>
                                        <option>Local Camera</option>
                                        <option>Stream URL</option>
                                        <option>RTSP Stream</option>
                                    </select>
                                </div>

                                <div className="btn-group">
                                    <button className="btn btn-primary">Save Settings</button>
                                </div>
                            </div>

                            <div className="card">
                                <h2>Danger Zone</h2>
                                <button 
                                    className="btn btn-secondary" 
                                    onClick={() => {
                                        if (confirm('Are you sure? This will clear all configurations.')) {
                                            localStorage.clear();
                                            setMirrors([]);
                                            showStatus('All data cleared', 'info');
                                        }
                                    }}
                                >
                                    Clear All Data
                                </button>
                            </div>
                        </div>

                        {/* Help Tab */}
                        <div className={`content-panel ${activeTab === 'help' ? 'active' : ''}`}>
                            <div className="card">
                                <h2>How to Configure Mirror Feeds</h2>
                                <div style={{ lineHeight: '1.8', color: 'var(--text-secondary)' }}>
                                    <h3 style={{ color: 'var(--text-primary)', marginTop: '1rem', marginBottom: '0.5rem' }}>🎥 Local Camera</h3>
                                    <p>Users will see their own camera feed. Default option for local mirrors.</p>

                                    <h3 style={{ color: 'var(--text-primary)', marginTop: '1rem', marginBottom: '0.5rem' }}>🌐 Stream URL (MJPEG)</h3>
                                    <p>Provide an MJPEG stream URL or continuous image stream URL.</p>
                                    <p style={{ fontSize: '0.9rem', marginTop: '0.5rem' }}>
                                        Example: <code style={{ background: 'rgba(255,255,255,0.05)', padding: '0.3rem 0.6rem', borderRadius: '4px' }}>http://192.168.1.100:8080/stream</code>
                                    </p>

                                    <h3 style={{ color: 'var(--text-primary)', marginTop: '1rem', marginBottom: '0.5rem' }}>📡 RTSP Stream</h3>
                                    <p>Real-time Streaming Protocol for live video feeds.</p>
                                    <p style={{ fontSize: '0.9rem', marginTop: '0.5rem' }}>
                                        Example: <code style={{ background: 'rgba(255,255,255,0.05)', padding: '0.3rem 0.6rem', borderRadius: '4px' }}>rtsp://192.168.1.100:554/stream</code>
                                    </p>

                                    <h3 style={{ color: 'var(--text-primary)', marginTop: '1rem', marginBottom: '0.5rem' }}>📌 Important</h3>
                                    <ul style={{ marginLeft: '1.5rem', marginTop: '0.5rem' }}>
                                        <li>Make sure streams are accessible from user's network</li>
                                        <li>Test the URL before saving</li>
                                        <li>Updates apply immediately to all connected users</li>
                                        <li>You can have multiple mirrors configured</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<AdminPanel />, document.getElementById('root'));
    </script>
</body>
</html>
